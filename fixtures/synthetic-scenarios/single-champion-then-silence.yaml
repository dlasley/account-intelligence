  - source_type: inbound_email
    account_slug: acme-corp
    count: 12
    axes:
      contact_diversity: single
      contact_email_origin: corporate
      response_cadence: burst
      sentiment_trajectory: flat
      email_tone: technical
      message_length: paragraph
      threading_topology: linear
      cross_modal: email_heavy
      concern_topic: utilization_decline

  # Silence: week 6-10 — achieved by omitting further email entries.
  # The structural gap (no signals) is the test vector, not a generator parameter.

target:
